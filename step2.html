<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FUTURE CAR CRAFT — 燃料タイプを選択</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--left"></div>
  <div class="bg-glow bg-glow--right"></div>

  <main class="step-stage">
    <div class="step-header">
      <p class="step-eyebrow">STEP 2 / 04</p>
      <h1 class="step-title">燃料タイプを入力してください</h1>
      <p class="step-sub">車両を動かすパワーユニットを自由に文字で入力すると、次のステップに進めます</p>
    </div>

    <div class="prompt-box">
      <input
        type="text"
        id="fuelPrompt"
        class="prompt-input"
        placeholder="例：ハイブリッド、EV、水素..."
        maxlength="80"
        autocomplete="off"
        aria-label="燃料タイプ"
      />
      <p class="prompt-hint">思い描いているパワーユニットを言葉で説明してください（候補は組み合わせて選べます）</p>
      <div class="suggestion-selected" id="selectedList" aria-label="選択中" hidden></div>
      <div class="suggestion-list" id="suggestionList" aria-label="候補"></div>
      <button type="button" class="suggestion-shuffle" id="shuffleBtn">
        <svg class="suggestion-shuffle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span>候補を入れ替える</span>
      </button>

      <div class="ratio-row" id="ratioRow" hidden>
        <p class="ratio-row__label">比率（0〜10、0で完全に除外）</p>
        <div class="ratio-list" id="ratioList"></div>
      </div>
    </div>

    <div class="step-actions">
      <a href="step.html" class="btn-back">← BACK</a>
      <button type="button" class="btn-next" id="nextBtn" disabled>
        <span>NEXT</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__dot"></span>
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
  </footer>

  <script>
    const promptInput = document.getElementById('fuelPrompt');
    const nextBtn = document.getElementById('nextBtn');

    // complete画面のサマリー表示用アイコンを、自由入力のキーワードから推定する。
    function guessFuelIcon(text) {
      const t = text.toLowerCase();
      const rules = [
        { icon: '⛽', words: ['ガソリン', 'gasoline', 'gas'] },
        { icon: '🛢️', words: ['ディーゼル', 'diesel'] },
        { icon: '🔋', words: ['ハイブリッド', 'hybrid'] },
        { icon: '🔌', words: ['プラグイン', 'phev'] },
        { icon: '⚡', words: ['ev', '電気', 'electric'] },
        { icon: '💧', words: ['水素', 'hydrogen', 'fcv'] },
        { icon: '☀️', words: ['太陽', 'solar'] },
        { icon: '🌪️', words: ['風', 'wind'] },
      ];
      for (const rule of rules) {
        if (rule.words.some((w) => t.includes(w))) return rule.icon;
      }
      return '⚡';
    }

    // 実在する燃料タイプのみのプール。ここからランダムに一部を候補として表示し、
    // 入れ替えできるようにする。一部の項目はさらに子項目を持ち、クリックすると
    // 候補リストがその子項目に切り替わる2段階構造になっている。
    const SUGGESTION_POOL = [
      'ガソリン', 'ディーゼル',
      { label: 'ハイブリッド', children: ['マイルドハイブリッド', 'ストロングハイブリッド', 'プラグインハイブリッド'] },
      { label: 'EV（電気）', children: ['リチウムイオン電池', '全固体電池', '急速充電対応'] },
      '水素（FCV）', '太陽光', '風力',
    ];
    const SUGGESTION_COUNT = 6;
    const COMBINE_SEPARATOR = ' × ';

    const selectedList = document.getElementById('selectedList');
    const suggestionList = document.getElementById('suggestionList');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const ratioRow = document.getElementById('ratioRow');
    const ratioList = document.getElementById('ratioList');
    let fuelRatios = {};
    let currentPicks = [];
    let activeParent = null;

    function itemLabel(item) {
      return typeof item === 'string' ? item : item.label;
    }

    function itemChildren(item) {
      return typeof item === 'string' ? null : item.children;
    }

    function pickRandomSuggestions(pool, count) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, count);
    }

    function currentSelected() {
      return getParts().map(extractBase);
    }

    function pickNewSuggestions() {
      currentPicks = pickRandomSuggestions(SUGGESTION_POOL, SUGGESTION_COUNT);
    }

    // 選択済みの候補は、常に見えるように候補リストの上に固定表示する。
    function renderSelected() {
      const selected = currentSelected();
      selectedList.innerHTML = '';
      selectedList.hidden = selected.length === 0;
      selected.forEach((label) => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'suggestion-chip is-active';
        chip.dataset.value = label;
        chip.textContent = label;
        selectedList.appendChild(chip);
      });
    }

    // 選択済みの候補は並び替えず、その場を空白の穴にして位置を保持する。
    // 子項目を持つ候補は、そこから2段階目の候補一覧に切り替えられる。
    function renderSuggestions() {
      const selected = currentSelected();
      const items = activeParent ? itemChildren(activeParent) : currentPicks;
      suggestionList.innerHTML = '';

      if (activeParent) {
        const backChip = document.createElement('button');
        backChip.type = 'button';
        backChip.className = 'suggestion-chip suggestion-chip--back';
        backChip.dataset.action = 'back';
        backChip.textContent = `← ${itemLabel(activeParent)}`;
        suggestionList.appendChild(backChip);
      }

      items.forEach((item) => {
        const label = itemLabel(item);
        const children = itemChildren(item);
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = selected.includes(label) ? 'suggestion-chip is-hole' : 'suggestion-chip';
        if (children) chip.classList.add('has-children');
        chip.dataset.value = label;
        chip.textContent = children ? `${label} ›` : label;
        suggestionList.appendChild(chip);
      });
    }

    function refreshSuggestionUI() {
      renderSelected();
      renderSuggestions();
    }

    function updateNextState() {
      nextBtn.disabled = promptInput.value.trim().length === 0;
    }

    function getParts() {
      return promptInput.value
        .split(COMBINE_SEPARATOR)
        .map((s) => s.trim())
        .filter(Boolean);
    }

    // 「ハイブリッド(7)」のような表記から、名前部分と比率（末尾の括弧内の数字）を取り出す。
    const RATIO_SUFFIX = /^(.*?)\((\d{1,2})\)\s*$/;

    function extractBase(part) {
      const m = part.match(RATIO_SUFFIX);
      return m ? m[1].trim() : part.trim();
    }

    function extractRatio(part) {
      const m = part.match(RATIO_SUFFIX);
      return m ? Math.min(10, Math.max(0, Number(m[2]))) : null;
    }

    // 比率を「名前(数字)」の形でテキストに埋め込む。組み合わせが1件だけなら数字は付けない。
    function buildDisplayText(baseParts) {
      if (baseParts.length <= 1) return baseParts.join(COMBINE_SEPARATOR);
      return baseParts.map((p) => `${p}(${fuelRatios[p] ?? 5})`).join(COMBINE_SEPARATOR);
    }

    function saveRatios() {
      try {
        localStorage.setItem('fcc:selectedFuelRatios', JSON.stringify(fuelRatios));
      } catch (e) {}
    }

    // 2つ以上の燃料タイプを組み合わせたときだけ、各要素の比率（0〜10、0で完全に除外）を
    // スライダーで調整できるようにする。
    function renderRatioRow(baseParts) {
      ratioRow.hidden = baseParts.length < 2;
      ratioList.innerHTML = '';
      if (baseParts.length < 2) return;
      baseParts.forEach((part) => {
        const item = document.createElement('div');
        item.className = 'ratio-item';

        const label = document.createElement('span');
        label.className = 'ratio-item__label';
        label.textContent = part;

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = '0';
        slider.max = '10';
        slider.value = String(fuelRatios[part] ?? 5);
        slider.className = 'ratio-item__slider';
        slider.setAttribute('aria-label', `${part} の比率`);

        const valueLabel = document.createElement('span');
        valueLabel.className = 'ratio-item__value';
        valueLabel.textContent = slider.value;

        // スライダーを動かすたびに、入力欄のテキストにも「名前(数字)」として反映する。
        slider.addEventListener('input', () => {
          fuelRatios[part] = Number(slider.value);
          valueLabel.textContent = slider.value;
          saveRatios();
          promptInput.value = buildDisplayText(getParts().map(extractBase));
          refreshSuggestionUI();
          try {
            localStorage.setItem('fcc:selectedFuel', promptInput.value.trim());
            localStorage.setItem('fcc:selectedFuelIcon', guessFuelIcon(promptInput.value));
          } catch (e) {}
        });

        item.append(label, slider, valueLabel);
        ratioList.appendChild(item);
      });
    }

    function syncRatios() {
      const rawParts = getParts();
      const baseParts = rawParts.map(extractBase);
      Object.keys(fuelRatios).forEach((k) => {
        if (!baseParts.includes(k)) delete fuelRatios[k];
      });
      rawParts.forEach((raw, i) => {
        const base = baseParts[i];
        const explicit = extractRatio(raw);
        if (explicit !== null) fuelRatios[base] = explicit;
        else if (!(base in fuelRatios)) fuelRatios[base] = 5;
      });
      renderRatioRow(baseParts);
      saveRatios();
    }

    promptInput.addEventListener('input', () => {
      const value = promptInput.value.trim();
      updateNextState();
      refreshSuggestionUI();
      syncRatios();
      try {
        localStorage.setItem('fcc:selectedFuel', value);
        localStorage.setItem('fcc:selectedFuelIcon', guessFuelIcon(value));
      } catch (e) {}
    });

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !nextBtn.disabled) {
        nextBtn.click();
      }
    });

    // チップは入れ替え機能で作り直されるため、コンテナへのイベント委譲で処理する。
    suggestionList.addEventListener('click', (e) => {
      if (e.target.closest('[data-action="back"]')) {
        activeParent = null;
        renderSuggestions();
        return;
      }

      const chip = e.target.closest('.suggestion-chip');
      if (!chip || chip.classList.contains('is-hole')) return;

      const baseParts = getParts().map(extractBase);
      const idx = baseParts.indexOf(chip.dataset.value);
      if (idx >= 0) {
        baseParts.splice(idx, 1);
        delete fuelRatios[chip.dataset.value];
      } else {
        baseParts.push(chip.dataset.value);
        if (!(chip.dataset.value in fuelRatios)) fuelRatios[chip.dataset.value] = 5;
      }
      promptInput.value = buildDisplayText(baseParts);
      promptInput.dispatchEvent(new Event('input'));

      if (chip.classList.contains('has-children')) {
        const items = activeParent ? itemChildren(activeParent) : currentPicks;
        activeParent = items.find((it) => itemLabel(it) === chip.dataset.value) || null;
        renderSuggestions();
      }
    });

    // 選択済みチップをクリックすると解除する（候補リストの上に常時表示される分）。
    selectedList.addEventListener('click', (e) => {
      const chip = e.target.closest('.suggestion-chip');
      if (!chip) return;
      const baseParts = getParts().map(extractBase);
      const idx = baseParts.indexOf(chip.dataset.value);
      if (idx >= 0) {
        baseParts.splice(idx, 1);
        delete fuelRatios[chip.dataset.value];
      }
      promptInput.value = buildDisplayText(baseParts);
      promptInput.dispatchEvent(new Event('input'));
    });

    shuffleBtn.addEventListener('click', () => {
      pickNewSuggestions();
      activeParent = null;
      refreshSuggestionUI();
    });

    try {
      const saved = localStorage.getItem('fcc:selectedFuel');
      const savedRatios = JSON.parse(localStorage.getItem('fcc:selectedFuelRatios') || '{}');
      fuelRatios = savedRatios || {};
      if (saved) {
        promptInput.value = saved;
        updateNextState();
      }
      syncRatios();
    } catch (e) {}

    pickNewSuggestions();
    refreshSuggestionUI();

    nextBtn.addEventListener('click', () => {
      const value = promptInput.value.trim();
      if (!value) return;
      window.location.href = 'step3.html';
    });
  </script>

</body>
</html>
