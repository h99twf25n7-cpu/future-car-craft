<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FUTURE CAR CRAFT — アートスタイルを選択</title>
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
  <script src="phi-grid.js"></script>
</head>
<body class="page-scroll">

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--left"></div>
  <div class="bg-glow bg-glow--right"></div>

  <main class="step-stage">
    <div class="step-header">
      <p class="step-eyebrow">STEP 5 / 05</p>
      <h1 class="step-title">アートスタイルを入力してください</h1>
      <p class="step-sub">完成イメージの画風を自由に文字で入力すると、生成される画像に反映されます（候補は1つだけ選べます）</p>
    </div>

    <div class="prompt-box">
      <input
        type="text"
        id="stylePrompt"
        class="prompt-input"
        placeholder="例：油絵風、鉛筆画、サイバーパンク..."
        maxlength="80"
        autocomplete="off"
        aria-label="アートスタイル"
      />
      <p class="prompt-hint">未入力の場合は写実的な写真スタイルで生成されます</p>
      <div class="suggestion-selected" id="selectedList" aria-label="選択中" hidden></div>
      <div class="suggestion-list" id="suggestionList" aria-label="候補"></div>
      <button type="button" class="suggestion-shuffle" id="shuffleBtn">
        <svg class="suggestion-shuffle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span>候補を入れ替える</span>
      </button>
    </div>

    <div class="step-actions">
      <a href="step4.html" class="btn-back"><span aria-hidden="true">←</span><span>BACK</span></a>
      <button type="button" class="btn-next" id="nextBtn">
        <span>COMPLETE</span>
        <span aria-hidden="true">→</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot footer__dot--active"></span>
  </footer>

  <script>
    const promptInput = document.getElementById('stylePrompt');
    const nextBtn = document.getElementById('nextBtn');
    const selectedList = document.getElementById('selectedList');
    const suggestionList = document.getElementById('suggestionList');
    const shuffleBtn = document.getElementById('shuffleBtn');

    // 現実的な描写スタイル＋近未来コンセプトに合う画風を混ぜたプール。一部の項目は
    // さらに子項目を持ち、クリックすると候補リストがその子項目に切り替わる
    // 2段階構造になっている。
    const SUGGESTION_POOL = [
      '写真（フォトリアル）', '油絵', '水彩画', '鉛筆画（スケッチ）',
      { label: 'アニメ風', children: ['セル画風', '劇画風', 'ジブリ風'] },
      { label: '3Dレンダー', children: ['フォトリアルCG', 'トゥーンレンダー', 'ワイヤーフレーム'] },
      'ピクセルアート', 'サイバーパンク風', 'ネオン', 'ミニマル',
      'ステンドグラス', 'ブループリント図面風', 'クレイアート', 'コンセプトアート',
    ];
    const SUGGESTION_COUNT = 6;
    let currentPicks = [];
    let activeParent = null;

    function itemLabel(item) {
      return typeof item === 'string' ? item : item.label;
    }

    function itemChildren(item) {
      return typeof item === 'string' ? null : item.children;
    }

    function pickRandomSuggestions(pool, count) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, count);
    }

    function pickNewSuggestions() {
      currentPicks = pickRandomSuggestions(SUGGESTION_POOL, SUGGESTION_COUNT);
    }

    // 選択中のスタイルは、常に見えるように候補リストの上に固定表示する。
    function renderSelected() {
      const value = promptInput.value.trim();
      selectedList.innerHTML = '';
      selectedList.hidden = !value;
      if (!value) return;
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'suggestion-chip is-active';
      chip.dataset.value = value;
      chip.textContent = value;
      selectedList.appendChild(chip);
    }

    // 選択中のスタイルは並び替えず、その場を空白の穴にして位置を保持する。
    // 子項目を持つ候補は、そこから2段階目の候補一覧に切り替えられる。
    function renderSuggestions() {
      const value = promptInput.value.trim();
      const items = activeParent ? itemChildren(activeParent) : currentPicks;
      suggestionList.innerHTML = '';

      if (activeParent) {
        const backChip = document.createElement('button');
        backChip.type = 'button';
        backChip.className = 'suggestion-chip suggestion-chip--back';
        backChip.dataset.action = 'back';
        backChip.textContent = `← ${itemLabel(activeParent)}`;
        suggestionList.appendChild(backChip);
      }

      items.forEach((item) => {
        const label = itemLabel(item);
        const children = itemChildren(item);
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = label === value ? 'suggestion-chip is-hole' : 'suggestion-chip';
        if (children) chip.classList.add('has-children');
        chip.dataset.value = label;
        chip.textContent = children ? `${label} ›` : label;
        suggestionList.appendChild(chip);
      });
    }

    function refreshSuggestionUI() {
      renderSelected();
      renderSuggestions();
    }

    function saveStyle() {
      try {
        localStorage.setItem('fcc:selectedStyle', promptInput.value.trim());
      } catch (e) {}
    }

    promptInput.addEventListener('input', () => {
      refreshSuggestionUI();
      saveStyle();
    });

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        nextBtn.click();
      }
    });

    // アートスタイルは複数選択不可。候補チップをクリックすると既存の選択を置き換える単一選択として動作する。
    suggestionList.addEventListener('click', (e) => {
      if (e.target.closest('[data-action="back"]')) {
        activeParent = null;
        renderSuggestions();
        return;
      }

      const chip = e.target.closest('.suggestion-chip');
      if (!chip || chip.classList.contains('is-hole')) return;

      promptInput.value = chip.dataset.value;
      promptInput.dispatchEvent(new Event('input'));

      if (chip.classList.contains('has-children')) {
        const items = activeParent ? itemChildren(activeParent) : currentPicks;
        activeParent = items.find((it) => itemLabel(it) === chip.dataset.value) || null;
        renderSuggestions();
      }
    });

    // 選択中チップをクリックすると解除する（候補リストの上に常時表示される分）。
    selectedList.addEventListener('click', (e) => {
      const chip = e.target.closest('.suggestion-chip');
      if (!chip) return;
      promptInput.value = '';
      promptInput.dispatchEvent(new Event('input'));
    });

    shuffleBtn.addEventListener('click', () => {
      pickNewSuggestions();
      activeParent = null;
      refreshSuggestionUI();
    });

    try {
      const saved = localStorage.getItem('fcc:selectedStyle');
      if (saved) {
        promptInput.value = saved;
      }
    } catch (e) {}

    pickNewSuggestions();
    refreshSuggestionUI();

    nextBtn.addEventListener('click', () => {
      saveStyle();
      window.location.href = 'complete.html';
    });
  </script>

</body>
</html>
