<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FUTURE CAR CRAFT — アートスタイルを選択</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-scroll">

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--left"></div>
  <div class="bg-glow bg-glow--right"></div>

  <main class="step-stage">
    <div class="step-header">
      <p class="step-eyebrow">STEP 4 / 04</p>
      <h1 class="step-title">アートスタイルを入力してください</h1>
      <p class="step-sub">完成イメージの画風を自由に文字で入力すると、生成される画像に反映されます（候補は1つだけ選べます）</p>
    </div>

    <div class="prompt-box">
      <input
        type="text"
        id="stylePrompt"
        class="prompt-input"
        placeholder="例：油絵風、鉛筆画、サイバーパンク..."
        maxlength="80"
        autocomplete="off"
        aria-label="アートスタイル"
      />
      <p class="prompt-hint">未入力の場合は写実的な写真スタイルで生成されます</p>
      <div class="suggestion-list" id="suggestionList" aria-label="候補"></div>
    </div>

    <div class="step-actions">
      <a href="step3.html" class="btn-back">← BACK</a>
      <button type="button" class="btn-next" id="nextBtn">
        <span>COMPLETE</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot footer__dot--active"></span>
  </footer>

  <script>
    const promptInput = document.getElementById('stylePrompt');
    const nextBtn = document.getElementById('nextBtn');
    const suggestionList = document.getElementById('suggestionList');

    // 現実的な描写スタイル＋近未来コンセプトに合う画風のプール。全件を常に一覧表示する。
    const SUGGESTION_POOL = [
      '写真（フォトリアル）', '油絵', '水彩画', '鉛筆画（スケッチ）', 'アニメ風',
      '3Dレンダー', 'ピクセルアート', 'サイバーパンク風', 'ネオン', 'ミニマル',
      'ステンドグラス', 'ブループリント図面風', 'クレイアート', 'コンセプトアート',
    ];

    function createChip(label, isSelected) {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = isSelected ? 'suggestion-chip is-active' : 'suggestion-chip';
      chip.dataset.value = label;
      chip.textContent = label;
      return chip;
    }

    // 候補は入れ替えず、プール全件を常に表示する。選択中のものは is-active で示す。
    function renderSuggestions() {
      const current = promptInput.value.trim();
      suggestionList.innerHTML = '';
      SUGGESTION_POOL.forEach((label) => {
        suggestionList.appendChild(createChip(label, current === label));
      });
    }

    function saveStyle() {
      try {
        localStorage.setItem('fcc:selectedStyle', promptInput.value.trim());
      } catch (e) {}
    }

    promptInput.addEventListener('input', () => {
      renderSuggestions();
      saveStyle();
    });

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        nextBtn.click();
      }
    });

    // アートスタイルは複数選択不可。候補チップをクリックすると、既存の選択を
    // 置き換える（同じチップを再クリックすると選択解除）単一選択として動作する。
    suggestionList.addEventListener('click', (e) => {
      const chip = e.target.closest('.suggestion-chip');
      if (!chip) return;
      const current = promptInput.value.trim();
      promptInput.value = current === chip.dataset.value ? '' : chip.dataset.value;
      promptInput.dispatchEvent(new Event('input'));
      promptInput.focus();
    });

    try {
      const saved = localStorage.getItem('fcc:selectedStyle');
      if (saved) {
        promptInput.value = saved;
      }
    } catch (e) {}

    renderSuggestions();

    nextBtn.addEventListener('click', () => {
      saveStyle();
      window.location.href = 'complete.html';
    });
  </script>

</body>
</html>
