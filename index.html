<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FUTURE CAR CRAFT</title>
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
  <script src="phi-grid.js"></script>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--left"></div>
  <div class="bg-glow bg-glow--right"></div>

  <main class="stage">
    <div class="hero">
      <h1 class="title">
        <span class="title__word title__word--future">FUTURE</span>
        <span class="title__word title__word--car">CAR</span>
        <span class="title__word title__word--craft">CRAFT</span>
      </h1>

      <div class="cta">
        <a href="step.html" class="btn-start" role="button">
          <span class="btn-start__label">START</span>
          <span class="btn-start__ring"></span>
        </a>

        <p class="hint">STARTをタップして体験を開始してください</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__dot"></span>
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot"></span>
  </footer>

</body>
</html>
