<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FUTURE CAR CRAFT — 車両の形状を選択</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--left"></div>
  <div class="bg-glow bg-glow--right"></div>

  <main class="step-stage">
    <div class="step-header">
      <p class="step-eyebrow">STEP 1 / 04</p>
      <h1 class="step-title">車両の形状を入力してください</h1>
      <p class="step-sub">作りたい車のボディタイプを自由に文字で入力すると、次のステップに進めます</p>
    </div>

    <div class="prompt-box">
      <input
        type="text"
        id="shapePrompt"
        class="prompt-input"
        placeholder="例：流線型のスポーツカー、力強いSUV、荷物が積めるピックアップ..."
        maxlength="80"
        autocomplete="off"
        aria-label="車両の形状"
      />
      <p class="prompt-hint">思い描いているボディタイプを言葉で説明してください（候補は組み合わせて選べます）</p>
      <div class="suggestion-list" id="suggestionList" aria-label="候補"></div>
      <button type="button" class="suggestion-shuffle" id="shuffleBtn">
        <svg class="suggestion-shuffle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span>候補を入れ替える</span>
      </button>

      <div class="ratio-row" id="ratioRow" hidden>
        <p class="ratio-row__label">比率（1〜10）</p>
        <div class="ratio-list" id="ratioList"></div>
      </div>
    </div>

    <div class="step-actions">
      <a href="index.html" class="btn-back">← BACK</a>
      <button type="button" class="btn-next" id="nextBtn" disabled>
        <span>NEXT</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
    <span class="footer__dot"></span>
  </footer>

  <script>
    const promptInput = document.getElementById('shapePrompt');
    const nextBtn = document.getElementById('nextBtn');

    // 3D preview には既定のプリセット形状しか無いため、自由入力からキーワードで
    // 最も近いプリセットを推定してフォールバックとして保存する。
    // ユーモア系の候補も、見た目の近いプリセットへざっくり寄せている。
    function guessShapeKey(text) {
      const t = text.toLowerCase();
      const rules = [
        { key: 'suv', words: ['suv', 'クロスオーバー', 'オフロード', '4wd', 'awd', 'ロボット', 'robot'] },
        { key: 'sports', words: ['スポーツ', 'sports', 'スーパーカー', 'super', 'レーシング', 'racing', 'ufo', '宇宙船', '流れ星', '昆虫'] },
        { key: 'minivan', words: ['ミニバン', 'minivan', 'van', 'ワゴン', 'ファミリー', '雲', 'クラゲ'] },
        { key: 'truck', words: ['トラック', 'truck', 'ピックアップ', 'pickup', '恐竜', '隕石'] },
        { key: 'coupe', words: ['クーペ', 'coupe', '貝殻'] },
      ];
      for (const rule of rules) {
        if (rule.words.some((w) => t.includes(w))) return rule.key;
      }
      return 'sedan';
    }

    // 現実的なボディタイプ＋近未来らしいユーモア枠を混ぜたプール。
    // ここからランダムに一部を候補として表示し、入れ替えできるようにする。
    const SUGGESTION_POOL = [
      'セダン', 'SUV', 'スポーツカー', 'ミニバン', 'ピックアップトラック', 'クーペ',
      'ステーションワゴン', 'オープンカー',
      'UFO型', '恐竜型', 'ロボット型', '宇宙船型', 'カプセル型',
      '昆虫型', '貝殻型', '雲型', '流れ星型', 'クラゲ型', '隕石型',
    ];
    const SUGGESTION_COUNT = 6;
    const COMBINE_SEPARATOR = ' × ';

    const suggestionList = document.getElementById('suggestionList');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const ratioRow = document.getElementById('ratioRow');
    const ratioList = document.getElementById('ratioList');
    let chips = [];
    let shapeRatios = {};

    function pickRandomSuggestions(pool, count) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, count);
    }

    function renderSuggestions() {
      suggestionList.innerHTML = '';
      pickRandomSuggestions(SUGGESTION_POOL, SUGGESTION_COUNT).forEach((label) => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'suggestion-chip';
        chip.dataset.value = label;
        chip.textContent = label;
        suggestionList.appendChild(chip);
      });
      chips = Array.from(suggestionList.querySelectorAll('.suggestion-chip'));
      syncChipsFromText();
    }

    function updateNextState() {
      nextBtn.disabled = promptInput.value.trim().length === 0;
    }

    // 入力中のテキストに候補の文言が含まれていれば、その候補チップを
    // 選択中として見た目に反映する（掛け合わせ状態を視覚化する）。
    function syncChipsFromText() {
      const value = promptInput.value;
      chips.forEach((chip) => {
        chip.classList.toggle('is-active', value.includes(chip.dataset.value));
      });
    }

    function getParts() {
      return promptInput.value
        .split(COMBINE_SEPARATOR)
        .map((s) => s.trim())
        .filter(Boolean);
    }

    // 「クラゲ型(7)」のような表記から、名前部分と比率（末尾の括弧内の数字）を取り出す。
    const RATIO_SUFFIX = /^(.*?)\((\d{1,2})\)\s*$/;

    function extractBase(part) {
      const m = part.match(RATIO_SUFFIX);
      return m ? m[1].trim() : part.trim();
    }

    function extractRatio(part) {
      const m = part.match(RATIO_SUFFIX);
      return m ? Math.min(10, Math.max(1, Number(m[2]))) : null;
    }

    // 比率を「名前(数字)」の形でテキストに埋め込む。組み合わせが1件だけなら数字は付けない。
    function buildDisplayText(baseParts) {
      if (baseParts.length <= 1) return baseParts.join(COMBINE_SEPARATOR);
      return baseParts.map((p) => `${p}(${shapeRatios[p] ?? 5})`).join(COMBINE_SEPARATOR);
    }

    function saveRatios() {
      try {
        localStorage.setItem('fcc:selectedShapeRatios', JSON.stringify(shapeRatios));
      } catch (e) {}
    }

    // 2つ以上の形状を組み合わせたときだけ、各要素の比率（1〜10）を
    // スライダーで調整できるようにする。
    function renderRatioRow(baseParts) {
      ratioRow.hidden = baseParts.length < 2;
      ratioList.innerHTML = '';
      if (baseParts.length < 2) return;
      baseParts.forEach((part) => {
        const item = document.createElement('div');
        item.className = 'ratio-item';

        const label = document.createElement('span');
        label.className = 'ratio-item__label';
        label.textContent = part;

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = '1';
        slider.max = '10';
        slider.value = String(shapeRatios[part] ?? 5);
        slider.className = 'ratio-item__slider';
        slider.setAttribute('aria-label', `${part} の比率`);

        const valueLabel = document.createElement('span');
        valueLabel.className = 'ratio-item__value';
        valueLabel.textContent = slider.value;

        // スライダーを動かすたびに、入力欄のテキストにも「名前(数字)」として反映する。
        slider.addEventListener('input', () => {
          shapeRatios[part] = Number(slider.value);
          valueLabel.textContent = slider.value;
          saveRatios();
          promptInput.value = buildDisplayText(getParts().map(extractBase));
          syncChipsFromText();
          try {
            localStorage.setItem('fcc:selectedShape', promptInput.value.trim());
            localStorage.setItem('fcc:selectedShapeKey', guessShapeKey(promptInput.value));
          } catch (e) {}
        });

        item.append(label, slider, valueLabel);
        ratioList.appendChild(item);
      });
    }

    function syncRatios() {
      const rawParts = getParts();
      const baseParts = rawParts.map(extractBase);
      Object.keys(shapeRatios).forEach((k) => {
        if (!baseParts.includes(k)) delete shapeRatios[k];
      });
      rawParts.forEach((raw, i) => {
        const base = baseParts[i];
        const explicit = extractRatio(raw);
        if (explicit !== null) shapeRatios[base] = explicit;
        else if (!(base in shapeRatios)) shapeRatios[base] = 5;
      });
      renderRatioRow(baseParts);
      saveRatios();
    }

    promptInput.addEventListener('input', () => {
      const value = promptInput.value.trim();
      updateNextState();
      syncChipsFromText();
      syncRatios();
      try {
        localStorage.setItem('fcc:selectedShape', value);
        localStorage.setItem('fcc:selectedShapeKey', guessShapeKey(value));
      } catch (e) {}
    });

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !nextBtn.disabled) {
        nextBtn.click();
      }
    });

    // チップは入れ替え機能で作り直されるため、コンテナへのイベント委譲で処理する。
    suggestionList.addEventListener('click', (e) => {
      const chip = e.target.closest('.suggestion-chip');
      if (!chip) return;
      const baseParts = getParts().map(extractBase);
      const idx = baseParts.indexOf(chip.dataset.value);
      if (idx >= 0) {
        baseParts.splice(idx, 1);
        delete shapeRatios[chip.dataset.value];
      } else {
        baseParts.push(chip.dataset.value);
        if (!(chip.dataset.value in shapeRatios)) shapeRatios[chip.dataset.value] = 5;
      }
      promptInput.value = buildDisplayText(baseParts);
      promptInput.dispatchEvent(new Event('input'));
      promptInput.focus();
    });

    shuffleBtn.addEventListener('click', () => renderSuggestions());

    renderSuggestions();

    try {
      const saved = localStorage.getItem('fcc:selectedShape');
      const savedRatios = JSON.parse(localStorage.getItem('fcc:selectedShapeRatios') || '{}');
      shapeRatios = savedRatios || {};
      if (saved) {
        promptInput.value = saved;
        updateNextState();
        syncChipsFromText();
      }
      syncRatios();
    } catch (e) {}

    nextBtn.addEventListener('click', () => {
      const value = promptInput.value.trim();
      if (!value) return;
      // 現在は形状のみで画像生成できるよう、燃料・カラー・スタイルのステップを一旦スキップする。
      try {
        localStorage.removeItem('fcc:selectedFuel');
        localStorage.removeItem('fcc:selectedFuelIcon');
        localStorage.removeItem('fcc:selectedColor');
        localStorage.removeItem('fcc:selectedColorHexes');
        localStorage.removeItem('fcc:selectedColorMix');
        localStorage.removeItem('fcc:selectedColorRatios');
        localStorage.removeItem('fcc:selectedStyle');
      } catch (e) {}
      window.location.href = 'complete.html';
    });
  </script>

</body>
</html>
