<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FUTURE CAR CRAFT — あなたの未来車が完成しました</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-scroll">

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--left"></div>
  <div class="bg-glow bg-glow--right"></div>

  <main class="step-stage">
    <div class="step-header">
      <p class="step-eyebrow">COMPLETE</p>
      <h1 class="step-title">あなたの未来車が完成しました</h1>
      <p class="step-sub">選択した内容は以下の通りです</p>
    </div>

    <div class="car-preview" id="carPreview">
      <div class="car-preview__glow" aria-hidden="true"></div>
    </div>

    <div class="summary-card" id="summaryCard">
      <div class="summary-row">
        <span class="summary-row__label">形状</span>
        <span class="summary-row__value" id="rowShape">
          <span class="summary-row__icon" aria-hidden="true">—</span>
          <span>未選択</span>
        </span>
      </div>
      <div class="summary-row">
        <span class="summary-row__label">燃料タイプ</span>
        <span class="summary-row__value" id="rowFuel">
          <span class="summary-row__icon" aria-hidden="true">—</span>
          <span>未選択</span>
        </span>
      </div>
      <div class="summary-row">
        <span class="summary-row__label">ボディカラー</span>
        <span class="summary-row__value" id="rowColor">
          <span class="summary-row__swatch" aria-hidden="true"></span>
          <span>未選択</span>
        </span>
      </div>
      <div class="summary-row">
        <span class="summary-row__label">アートスタイル</span>
        <span class="summary-row__value" id="rowStyle">
          <span class="summary-row__icon" aria-hidden="true">🎨</span>
          <span>写真（フォトリアル）</span>
        </span>
      </div>
    </div>

    <div class="ai-image" id="aiImageSection">
      <button type="button" class="btn-next" id="generateImageBtn">
        <span>画像を作成</span>
      </button>
      <p class="ai-image__status" id="aiImageStatus" aria-live="polite"></p>
      <div class="ai-image__result" id="aiImageResult" hidden>
        <img class="ai-image__img" id="aiImageImg" alt="AIが生成した未来車のイメージ" />
      </div>
    </div>

    <div class="step-actions">
      <a href="step4.html" class="btn-back">← BACK</a>
      <button type="button" class="btn-next" id="restartBtn">
        <span>RESTART</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot footer__dot--active"></span>
  </footer>

  <script>
    const SHAPE_ICONS = {
      sedan:   '🚗',
      suv:     '🚙',
      sports:  '🏎️',
      minivan: '🚐',
      truck:   '🛻',
      coupe:   '🚘',
    };

    function readStorage(key) {
      try {
        return localStorage.getItem(key);
      } catch (e) {
        return null;
      }
    }

    const shapeLabel = readStorage('fcc:selectedShape');
    const shapeKey = readStorage('fcc:selectedShapeKey') || 'sedan';
    const fuelLabel = readStorage('fcc:selectedFuel');
    const fuelIcon = readStorage('fcc:selectedFuelIcon') || '⚡';
    const colorLabel = readStorage('fcc:selectedColor');
    const colorMix = readStorage('fcc:selectedColorMix') || 'solid';
    let colorHexes = [];
    try {
      colorHexes = JSON.parse(readStorage('fcc:selectedColorHexes') || '[]');
    } catch (e) {}
    const styleLabel = readStorage('fcc:selectedStyle');

    const carPreview = document.getElementById('carPreview');
    if (colorHexes.length) {
      carPreview.style.setProperty(
        '--car-color',
        colorHexes.length > 1 ? `linear-gradient(90deg, ${colorHexes.join(', ')})` : colorHexes[0]
      );
    }

    if (shapeLabel) {
      const row = document.getElementById('rowShape');
      row.querySelector('.summary-row__icon').textContent = SHAPE_ICONS[shapeKey] || '🚗';
      row.querySelector('span:last-child').textContent = shapeLabel;
    }

    if (fuelLabel) {
      const row = document.getElementById('rowFuel');
      row.querySelector('.summary-row__icon').textContent = fuelIcon;
      row.querySelector('span:last-child').textContent = fuelLabel;
    }

    if (colorLabel) {
      const row = document.getElementById('rowColor');
      const swatch = row.querySelector('.summary-row__swatch');
      if (colorHexes.length) {
        swatch.style.background = colorHexes.length > 1
          ? `linear-gradient(135deg, ${colorHexes.join(', ')})`
          : colorHexes[0];
        swatch.style.setProperty('--swatch-glow', colorHexes[0]);
      }
      row.querySelector('span:last-child').textContent = colorLabel;
    }

    if (styleLabel) {
      document.getElementById('rowStyle').querySelector('span:last-child').textContent = styleLabel;
    }

    // Pollinations の画像生成エンドポイントは GET リクエストの URL に
    // プロンプトを埋め込むだけで画像を直接返すため、サーバー側の処理なしで
    // <img> の src に組み込める。
    // 画像生成モデルは日本語の形状名をそのまま渡してもほぼ理解できないため、
    // 候補チップの語だけでも英語の説明句に変換してから渡す（未知の語はそのまま通す）。
    const SHAPE_PROMPT_MAP = {
      'ステーションワゴン': 'a futuristic station wagon',
      'ピックアップトラック': 'a futuristic pickup truck',
      'スポーツカー': 'a futuristic sports car',
      'オープンカー': 'a futuristic convertible car',
      'ミニバン': 'a futuristic minivan',
      'ピックアップ': 'a futuristic pickup truck',
      'クーペ': 'a futuristic coupe car',
      'セダン': 'a futuristic sedan car',
      'SUV': 'a futuristic SUV',
      'UFO型': 'a flying-saucer-shaped hovering vehicle (UFO design)',
      'UFO': 'a flying-saucer-shaped hovering vehicle (UFO design)',
      '恐竜型': 'a dinosaur-shaped vehicle with organic scaly bodywork',
      '恐竜': 'a dinosaur-shaped vehicle with organic scaly bodywork',
      'ロボット型': 'a robot-shaped transforming vehicle',
      'ロボット': 'a robot-shaped transforming vehicle',
      '宇宙船型': 'a spaceship-shaped vehicle',
      '宇宙船': 'a spaceship-shaped vehicle',
      'カプセル型': 'a capsule-shaped pod vehicle',
      'カプセル': 'a capsule-shaped pod vehicle',
      '昆虫型': 'an insect-shaped vehicle with a segmented exoskeleton body',
      '昆虫': 'an insect-shaped vehicle with a segmented exoskeleton body',
      '貝殻型': 'a seashell-shaped vehicle with a spiral curved shell body',
      '貝殻': 'a seashell-shaped vehicle with a spiral curved shell body',
      '雲型': 'a cloud-shaped vehicle with a soft rounded fluffy body',
      '雲': 'a cloud-shaped vehicle with a soft rounded fluffy body',
      '流れ星型': 'a shooting-star-shaped streamlined vehicle with a glowing trail',
      '流れ星': 'a shooting-star-shaped streamlined vehicle with a glowing trail',
      'クラゲ型': 'a jellyfish-shaped vehicle with a translucent dome and flowing tentacle-like fins',
      'クラゲ': 'a jellyfish-shaped vehicle with a translucent dome and flowing tentacle-like fins',
      '隕石型': 'a meteorite-shaped rugged rocky vehicle',
      '隕石': 'a meteorite-shaped rugged rocky vehicle',
    };
    const SHAPE_KEYS = Object.keys(SHAPE_PROMPT_MAP).sort((a, b) => b.length - a.length);

    const FUEL_PROMPT_MAP = {
      'ガソリン': 'gasoline-powered',
      'ディーゼル': 'diesel-powered',
      'プラグインハイブリッド': 'plug-in hybrid powered',
      'ハイブリッド': 'hybrid powered',
      '水素': 'hydrogen fuel cell powered',
      'EV': 'electric powered',
      '電気': 'electric powered',
      'チョコレート': 'whimsically powered by chocolate',
      '炭酸': 'whimsically powered by soda fizz',
      '空気': 'powered by compressed air',
      'コーヒー': 'whimsically powered by coffee',
      '太陽光': 'solar powered',
      '風力': 'wind powered',
      'ドーナツ': 'whimsically powered by donuts',
    };
    const FUEL_KEYS = Object.keys(FUEL_PROMPT_MAP).sort((a, b) => b.length - a.length);

    const MIX_WORDS = {
      marble: 'marble swirl pattern',
      gradient: 'smooth gradient blend',
      twotone: 'two-tone split paint',
      stripe: 'racing stripe pattern',
    };

    // 画風の指定は「油絵」なのに末尾が「professional photography」のままだと
    // 矛盾してしまうため、スタイルが選ばれたときは既定の写真調の締めを丸ごと
    // 置き換える。
    const STYLE_PROMPT_MAP = {
      '写真（フォトリアル）': 'photorealistic photograph, studio lighting, highly detailed, cinematic',
      'フォトリアル': 'photorealistic photograph, studio lighting, highly detailed, cinematic',
      '写真': 'photorealistic photograph, studio lighting, highly detailed, cinematic',
      '油絵': 'oil painting style, visible brush strokes, rich textured canvas',
      '水彩画': 'watercolor painting style, soft flowing pigments, paper texture',
      '水彩': 'watercolor painting style, soft flowing pigments, paper texture',
      '鉛筆画（スケッチ）': 'pencil sketch style, hand-drawn graphite shading, sketchbook paper',
      '鉛筆画': 'pencil sketch style, hand-drawn graphite shading, sketchbook paper',
      '鉛筆': 'pencil sketch style, hand-drawn graphite shading, sketchbook paper',
      'スケッチ': 'rough sketch style, hand-drawn pencil lines',
      'アニメ風': 'anime style illustration, cel-shaded, vibrant colors',
      'アニメ': 'anime style illustration, cel-shaded, vibrant colors',
      '3Dレンダー': '3D render, octane render, studio lighting, highly detailed',
      'ピクセルアート': 'pixel art style, retro 8-bit video game aesthetic',
      'サイバーパンク風': 'cyberpunk neon style, glowing neon lights, futuristic city backdrop',
      'サイバーパンク': 'cyberpunk neon style, glowing neon lights, futuristic city backdrop',
      'ネオン': 'neon glow style, vibrant neon lighting, dark background',
      'ミニマル': 'minimalist design, flat colors, clean simple background',
      'ステンドグラス': 'stained glass art style, colorful glass panel textures',
      'ブループリント図面風': 'technical blueprint schematic style, line drawing on blueprint paper',
      'ブループリント': 'technical blueprint schematic style, line drawing on blueprint paper',
      'クレイアート': 'claymation style, stop-motion clay model texture',
      'コンセプトアート': 'digital concept art, matte painting style, highly detailed',
    };
    const STYLE_KEYS = Object.keys(STYLE_PROMPT_MAP).sort((a, b) => b.length - a.length);
    const DEFAULT_STYLE_CLAUSE = 'studio lighting, professional concept vehicle photography, highly detailed, cinematic';

    function translatePart(word, map, keys) {
      const trimmed = word.trim();
      if (!trimmed) return null;
      const key = keys.find((k) => trimmed.includes(k));
      return key ? map[key] : trimmed;
    }

    function translateText(text, map, keys, joiner) {
      if (!text) return null;
      const parts = text
        .split(' × ')
        .map((s) => s.trim())
        .filter(Boolean)
        .map((part) => translatePart(part, map, keys));
      return parts.length ? parts.join(joiner) : null;
    }

    function buildImagePrompt() {
      const shapePart = translateText(shapeLabel, SHAPE_PROMPT_MAP, SHAPE_KEYS, ' combined with ')
        || 'a futuristic vehicle';
      const fuelPart = translateText(fuelLabel, FUEL_PROMPT_MAP, FUEL_KEYS, ' and ');
      const fuelClause = fuelPart ? `, ${fuelPart}` : '';
      let colorPart = '';
      if (colorHexes.length > 1) {
        colorPart = `, painted in a ${MIX_WORDS[colorMix] || 'mixed color'} of ${colorLabel}`;
      } else if (colorLabel) {
        colorPart = `, painted in ${colorLabel}`;
      }
      const styleClause = translateText(styleLabel, STYLE_PROMPT_MAP, STYLE_KEYS, ', ') || DEFAULT_STYLE_CLAUSE;
      return `${shapePart}, near-future concept design${fuelClause}${colorPart}, ${styleClause}`;
    }

    function buildImageUrl(prompt) {
      const seed = Math.floor(Math.random() * 1_000_000_000);
      return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=512&seed=${seed}&nologo=true`;
    }

    const generateImageBtn = document.getElementById('generateImageBtn');
    const aiImageStatus = document.getElementById('aiImageStatus');
    const aiImageResult = document.getElementById('aiImageResult');
    const aiImageImg = document.getElementById('aiImageImg');

    generateImageBtn.addEventListener('click', () => {
      generateImageBtn.disabled = true;
      aiImageStatus.textContent = '画像を生成しています…';
      aiImageResult.hidden = true;

      const preload = new Image();
      preload.onload = () => {
        aiImageImg.src = preload.src;
        aiImageResult.hidden = false;
        aiImageStatus.textContent = '';
        generateImageBtn.disabled = false;
        generateImageBtn.querySelector('span').textContent = '別の画像を作成';
      };
      preload.onerror = () => {
        aiImageStatus.textContent = '画像の生成に失敗しました。もう一度お試しください。';
        generateImageBtn.disabled = false;
      };
      preload.src = buildImageUrl(buildImagePrompt());
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      try {
        localStorage.removeItem('fcc:selectedShape');
        localStorage.removeItem('fcc:selectedShapeKey');
        localStorage.removeItem('fcc:selectedFuel');
        localStorage.removeItem('fcc:selectedFuelIcon');
        localStorage.removeItem('fcc:selectedColor');
        localStorage.removeItem('fcc:selectedColorHexes');
        localStorage.removeItem('fcc:selectedColorMix');
        localStorage.removeItem('fcc:selectedStyle');
      } catch (e) {}
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
