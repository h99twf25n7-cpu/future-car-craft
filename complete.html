<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FUTURE CAR CRAFT — あなたの未来車が完成しました</title>
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
  <script src="phi-grid.js"></script>
</head>
<body class="page-scroll">

  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--left"></div>
  <div class="bg-glow bg-glow--right"></div>

  <main class="step-stage">
    <div class="step-header">
      <p class="step-eyebrow">COMPLETE</p>
      <h1 class="step-title">あなたの未来車が完成しました</h1>
      <p class="step-sub">選択した内容は以下の通りです</p>
    </div>

    <div class="car-preview" id="carPreview">
      <div class="car-preview__glow" aria-hidden="true"></div>
    </div>

    <div class="summary-card" id="summaryCard">
      <div class="summary-row">
        <span class="summary-row__label">形状</span>
        <span class="summary-row__value" id="rowShape">
          <span class="summary-row__icon" aria-hidden="true">—</span>
          <span>未選択</span>
        </span>
      </div>
      <div class="summary-row" id="rowFuelWrap" hidden>
        <span class="summary-row__label">燃料タイプ</span>
        <span class="summary-row__value" id="rowFuel">
          <span class="summary-row__icon" aria-hidden="true">—</span>
          <span>未選択</span>
        </span>
      </div>
      <div class="summary-row" id="rowColorWrap" hidden>
        <span class="summary-row__label">ボディカラー</span>
        <span class="summary-row__value" id="rowColor">
          <span class="summary-row__swatch" aria-hidden="true"></span>
          <span>未選択</span>
        </span>
      </div>
      <div class="summary-row" id="rowBackgroundWrap" hidden>
        <span class="summary-row__label">背景</span>
        <span class="summary-row__value" id="rowBackground">
          <span class="summary-row__icon" aria-hidden="true">🏞️</span>
          <span>未選択</span>
        </span>
      </div>
      <div class="summary-row" id="rowStyleWrap" hidden>
        <span class="summary-row__label">アートスタイル</span>
        <span class="summary-row__value" id="rowStyle">
          <span class="summary-row__icon" aria-hidden="true">🎨</span>
          <span>写真（フォトリアル）</span>
        </span>
      </div>
    </div>

    <div class="ai-image" id="aiImageSection">
      <div class="ai-image__password">
        <label for="aiImagePassword" class="ai-image__password-label">パスワード</label>
        <input type="password" id="aiImagePassword" class="ai-image__password-input" autocomplete="current-password" />
      </div>
      <button type="button" class="btn-next" id="generateImageBtn">
        <span>画像を作成</span>
      </button>
      <p class="ai-image__status" id="aiImageStatus" aria-live="polite"></p>
      <div class="ai-image__progress" id="aiImageProgress" hidden>
        <div class="ai-image__progress-track">
          <div class="ai-image__progress-fill" id="aiImageProgressFill"></div>
        </div>
        <span class="ai-image__progress-text" id="aiImageProgressText">0%</span>
      </div>
      <div class="ai-image__result" id="aiImageResult" hidden>
        <img class="ai-image__img" id="aiImageImg" alt="AIが生成した未来車のイメージ" />
      </div>
    </div>

    <div class="step-actions">
      <a href="step5.html" class="btn-back"><span aria-hidden="true">←</span><span>BACK</span></a>
      <button type="button" class="btn-next" id="restartBtn">
        <span>RESTART</span>
        <span aria-hidden="true">→</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot footer__dot--active"></span>
    <span class="footer__dot footer__dot--active"></span>
  </footer>

  <script>
    const SHAPE_ICONS = {
      kei:     '🚗',
      sedan:   '🚗',
      suv:     '🚙',
      sports:  '🏎️',
      minivan: '🚐',
      truck:   '🛻',
      coupe:   '🚘',
    };

    function readStorage(key) {
      try {
        return localStorage.getItem(key);
      } catch (e) {
        return null;
      }
    }

    const shapeLabel = readStorage('fcc:selectedShape');
    const shapeKey = readStorage('fcc:selectedShapeKey') || 'sedan';
    const fuelLabel = readStorage('fcc:selectedFuel');
    const fuelIcon = readStorage('fcc:selectedFuelIcon') || '⚡';
    const colorLabel = readStorage('fcc:selectedColor');
    const colorMix = readStorage('fcc:selectedColorMix') || 'solid';
    let colorHexes = [];
    try {
      colorHexes = JSON.parse(readStorage('fcc:selectedColorHexes') || '[]');
    } catch (e) {}
    const backgroundLabel = readStorage('fcc:selectedBackground');
    const styleLabel = readStorage('fcc:selectedStyle');

    const carPreview = document.getElementById('carPreview');
    if (colorHexes.length) {
      carPreview.style.setProperty(
        '--car-color',
        colorHexes.length > 1 ? `linear-gradient(90deg, ${colorHexes.join(', ')})` : colorHexes[0]
      );
    }

    if (shapeLabel) {
      const row = document.getElementById('rowShape');
      row.querySelector('.summary-row__icon').textContent = SHAPE_ICONS[shapeKey] || '🚗';
      row.querySelector('span:last-child').textContent = shapeLabel;
    }

    if (fuelLabel) {
      document.getElementById('rowFuelWrap').hidden = false;
      const row = document.getElementById('rowFuel');
      row.querySelector('.summary-row__icon').textContent = fuelIcon;
      row.querySelector('span:last-child').textContent = fuelLabel;
    }

    if (colorLabel) {
      document.getElementById('rowColorWrap').hidden = false;
      const row = document.getElementById('rowColor');
      const swatch = row.querySelector('.summary-row__swatch');
      if (colorHexes.length) {
        swatch.style.background = colorHexes.length > 1
          ? `linear-gradient(135deg, ${colorHexes.join(', ')})`
          : colorHexes[0];
        swatch.style.setProperty('--swatch-glow', colorHexes[0]);
      }
      row.querySelector('span:last-child').textContent = colorLabel;
    }

    if (backgroundLabel) {
      document.getElementById('rowBackgroundWrap').hidden = false;
      document.getElementById('rowBackground').querySelector('span:last-child').textContent = backgroundLabel;
    }

    if (styleLabel) {
      document.getElementById('rowStyleWrap').hidden = false;
      document.getElementById('rowStyle').querySelector('span:last-child').textContent = styleLabel;
    }

    // 画像生成は /api/generate-image（サーバー側でパスワード確認 → Gemini API 呼び出し）
    // に prompt を POST し、返ってきた base64 画像データを <img> に表示する。
    // 完全リセット状態：あらかじめ用意した英語の説明句・固定スタイル文言は
    // 一切持たない。ここに追記する定義は自分で一つずつ決めていく
    // （例："SUV": "a futuristic SUV, ..." のように追加する）。
    // 未定義の語は translatePart によりそのまま（日本語のまま）プロンプトに渡される。
    // 実在の車種名は使わず、規格・形状の物理的特徴だけを記述する
    // （特定車種の意匠をそのまま模倣させず、"軽自動車らしさ"を出すため）。
    const SHAPE_PROMPT_MAP = {
      '軽自動車': 'Compact Japanese kei car, one-box van-like silhouette, extremely tall roofline much taller than the car is wide, tall boxy cabin standing upright like a small box on wheels, not a hatchback, not low, not sleek, very short front/rear overhangs, wheels at the four corners, small wheels, short hood, upright A-pillars, tall greenhouse with large glass area, sliding door, yellow Japanese kei-car license plate, front three-quarter view, photorealistic, daylight',
    };
    const SHAPE_KEYS = Object.keys(SHAPE_PROMPT_MAP).sort((a, b) => b.length - a.length);

    const FUEL_PROMPT_MAP = {};
    const FUEL_KEYS = Object.keys(FUEL_PROMPT_MAP).sort((a, b) => b.length - a.length);

    const BACKGROUND_PROMPT_MAP = {};
    const BACKGROUND_KEYS = Object.keys(BACKGROUND_PROMPT_MAP).sort((a, b) => b.length - a.length);

    const STYLE_PROMPT_MAP = {};
    const STYLE_KEYS = Object.keys(STYLE_PROMPT_MAP).sort((a, b) => b.length - a.length);

    function translatePart(word, map, keys) {
      const trimmed = word.trim();
      if (!trimmed) return null;
      const key = keys.find((k) => trimmed.includes(k));
      return key ? map[key] : trimmed;
    }

    function translateText(text, map, keys, joiner) {
      if (!text) return null;
      const parts = text
        .split(' × ')
        .map((s) => s.trim())
        .filter(Boolean)
        .map((part) => translatePart(part, map, keys));
      return parts.length ? parts.join(joiner) : null;
    }

    // STEP1/STEP3では選択候補を組み合わせると「名前(数字)」の形で比率（0〜10）が
    // テキストに埋め込まれる。ここではその数字を読み取り、百分率に正規化する。
    const RATIO_SUFFIX = /^(.*?)\((\d{1,2})\)\s*$/;

    function splitPartWithRatio(raw) {
      const m = raw.match(RATIO_SUFFIX);
      if (m) return { text: m[1].trim(), ratio: Math.min(10, Math.max(0, Number(m[2]))) };
      return { text: raw.trim(), ratio: 5 };
    }

    function computePercentages(weights) {
      const sum = weights.reduce((a, b) => a + b, 0) || 1;
      return weights.map((w) => Math.round((w / sum) * 100));
    }

    // 比率が0の要素は「混ぜない」ことを意味するので、生成プロンプトから完全に除外する。
    // 全てが0の場合（あり得ないはずだが念のため）は除外前の一覧にフォールバックする。
    function dropZeroRatio(parsed) {
      const active = parsed.filter((p) => p.ratio > 0);
      return active.length ? active : parsed;
    }

    // 形状は「SUV(7) × セダン(3)」のように複数組み合わせた場合、埋め込まれた比率を
    // 「70% SUV blended with 30% sedan」のように生成プロンプトへ反映する。
    // 比率0の要素は混ぜず、単体選択のときは比率を付けない。
    function translateShapeWithRatio(text) {
      if (!text) return null;
      const rawParts = text.split(' × ').map((s) => s.trim()).filter(Boolean);
      if (!rawParts.length) return null;
      if (rawParts.length === 1) return translatePart(rawParts[0], SHAPE_PROMPT_MAP, SHAPE_KEYS);
      const active = dropZeroRatio(rawParts.map(splitPartWithRatio));
      if (active.length === 1) return translatePart(active[0].text, SHAPE_PROMPT_MAP, SHAPE_KEYS);
      const translated = active.map((p) => translatePart(p.text, SHAPE_PROMPT_MAP, SHAPE_KEYS));
      const pct = computePercentages(active.map((p) => p.ratio));
      return translated.map((t, i) => `${pct[i]}% ${t}`).join(' blended with ');
    }

    // カラーも同様に、2色以上の組み合わせなら埋め込まれた比率を
    // 「70% レーシングレッド and 30% クリスタルブラック」のような形で反映する。
    // 比率0の色は混ぜない。混ぜ方（marble/gradient/twotone/stripe）は説明句に
    // 変換せず、選択されたキーをそのまま使う。
    function buildColorClause() {
      if (!colorLabel) return '';
      const rawParts = colorLabel.split(' × ').map((s) => s.trim()).filter(Boolean);
      if (colorHexes.length > 1 && rawParts.length > 1) {
        const active = dropZeroRatio(rawParts.map(splitPartWithRatio));
        if (active.length === 1) return `painted in ${active[0].text}`;
        const pct = computePercentages(active.map((p) => p.ratio));
        const blend = active.map((p, i) => `${pct[i]}% ${p.text}`).join(' and ');
        return `painted in a ${colorMix} blend of ${blend}`;
      }
      return `painted in ${splitPartWithRatio(colorLabel).text}`;
    }

    // 完全リセット状態：固定のスタイル文言（"near-future concept design" 等）は
    // 一切付け加えず、選択された内容だけをそのままつなげてプロンプトにする。
    function buildImagePrompt() {
      const parts = [
        translateShapeWithRatio(shapeLabel),
        translateText(fuelLabel, FUEL_PROMPT_MAP, FUEL_KEYS, ' and '),
        buildColorClause(),
        translateText(backgroundLabel, BACKGROUND_PROMPT_MAP, BACKGROUND_KEYS, ', '),
        translateText(styleLabel, STYLE_PROMPT_MAP, STYLE_KEYS, ', '),
      ].filter(Boolean);
      return parts.join(', ') || 'a vehicle';
    }

    // GitHub Pages（静的ホスティング）にはAPIサーバーを置けないため、
    // ローカル開発時は同一オリジンの相対パスを、公開サイトでは
    // 別途デプロイしたRenderのバックエンドURLを叩く。
    const API_BASE =
      location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? ''
        : 'https://future-car-craft.onrender.com';

    const generateImageBtn = document.getElementById('generateImageBtn');
    const aiImageStatus = document.getElementById('aiImageStatus');
    const aiImageProgress = document.getElementById('aiImageProgress');
    const aiImageProgressFill = document.getElementById('aiImageProgressFill');
    const aiImageProgressText = document.getElementById('aiImageProgressText');
    const aiImageResult = document.getElementById('aiImageResult');
    const aiImageImg = document.getElementById('aiImageImg');
    const aiImagePassword = document.getElementById('aiImagePassword');

    // gpt-image-1 は通常のリクエストでは生成の途中経過を返さないため、
    // 生成にかかる典型的な時間（十数秒〜数十秒）を目安に、90%までは
    // 徐々に減速しながら近づく疑似プログレスを表示する。
    // 実際のレスポンスが返ってきた時点で100%まで一気に進める。
    let progressTimer = null;
    let progressValue = 0;

    function setProgress(value) {
      progressValue = value;
      const pct = Math.round(value);
      aiImageProgressFill.style.width = `${pct}%`;
      aiImageProgressText.textContent = `${pct}%`;
    }

    function startProgress() {
      progressValue = 0;
      setProgress(0);
      aiImageProgress.hidden = false;
      progressTimer = setInterval(() => {
        setProgress(progressValue + (90 - progressValue) * 0.06 + 0.2);
      }, 200);
    }

    function stopProgress() {
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    generateImageBtn.addEventListener('click', async () => {
      const password = aiImagePassword.value;
      if (!password) {
        aiImageStatus.textContent = 'パスワードを入力してください。';
        aiImagePassword.focus();
        return;
      }

      generateImageBtn.disabled = true;
      aiImageStatus.textContent = '画像を生成しています…';
      aiImageResult.hidden = true;
      startProgress();

      try {
        const res = await fetch(`${API_BASE}/api/generate-image`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, prompt: buildImagePrompt() }),
        });
        const data = await res.json();
        aiImagePassword.value = '';

        if (!res.ok) {
          stopProgress();
          aiImageProgress.hidden = true;
          aiImageStatus.textContent = data.error || '画像の生成に失敗しました。もう一度お試しください。';
          generateImageBtn.disabled = false;
          return;
        }

        stopProgress();
        setProgress(100);
        aiImageImg.src = `data:${data.mimeType};base64,${data.data}`;
        aiImageResult.hidden = false;
        aiImageStatus.textContent = '';
        setTimeout(() => { aiImageProgress.hidden = true; }, 400);
        generateImageBtn.disabled = false;
        generateImageBtn.querySelector('span').textContent = '別の画像を作成';
      } catch (e) {
        stopProgress();
        aiImageProgress.hidden = true;
        aiImagePassword.value = '';
        aiImageStatus.textContent = '画像の生成に失敗しました。もう一度お試しください。';
        generateImageBtn.disabled = false;
      }
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      try {
        localStorage.removeItem('fcc:selectedShape');
        localStorage.removeItem('fcc:selectedShapeKey');
        localStorage.removeItem('fcc:selectedShapeRatios');
        localStorage.removeItem('fcc:selectedFuel');
        localStorage.removeItem('fcc:selectedFuelIcon');
        localStorage.removeItem('fcc:selectedColor');
        localStorage.removeItem('fcc:selectedColorHexes');
        localStorage.removeItem('fcc:selectedColorMix');
        localStorage.removeItem('fcc:selectedColorRatios');
        localStorage.removeItem('fcc:selectedBackground');
        localStorage.removeItem('fcc:selectedStyle');
      } catch (e) {}
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
